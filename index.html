<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distrito 21</title>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <nav class="menu-superior">
        <a href="#">Inicio</a>
        <a href="#">Acerca de</a>
        <a href="#">Servicios</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<div class="contenedor">

    

    <main class="contenido">

    <div class="bloque-titulo">
    <h1 class="titulo-principal">Bienvenido a Distrito 21</h1>
    <p class="subtitulo">Explora nuestras categorías principales</p>
    </div>

    <section class="grid-categorias">

        <a href="poleras/poleras.html" class="categoria-card">
            <img src="poleras/poleraOversizeBeige.png" alt="Poleras">
            <h2>Poleras</h2>
        </a>

        <a href="pantalones/pantalones.html" class="categoria-card">
            <img src="pantalones/pantalonbaggy.png" alt="Pantalones">
            <h2>Pantalones</h2>
        </a>

        <a href="ropa interior/ropainterior.html" class="categoria-card">
            <img src="ropa interior/bwp.png" alt="Ropa interior">
            <h2>Ropa Interior</h2>
        </a>

        <a href="accesorios/accesorios.html" class="categoria-card">
            <img src="accesorios/gorra jerry.png" alt="Accesorios">
            <h2>Accesorios</h2>
        </a>

    </section>

</main>

</div>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const imagenes = [
        "media/fondo1.jpg",
        "media/fondo2.jpg",
        "media/fondo3.jpg",
        "media/fondo4.jpg"
    ];

    const imagenAleatoria = imagenes[Math.floor(Math.random() * imagenes.length)];

    document.body.style.backgroundImage = 
        `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url(${imagenAleatoria})`;

    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    document.body.style.backgroundAttachment = "fixed";
});
document.addEventListener("DOMContentLoaded", function() {
    let lastScrollTop = 0;
    const header = document.querySelector('header');

    window.addEventListener('scroll', function() {
        if (window.innerWidth <= 768) {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            // Si subes el dedo (scroll arriba), muestra. Si bajas, oculta.
            if (scrollTop < lastScrollTop) {
                header.classList.add('header-visible');
            } else {
                header.classList.remove('header-visible');
            }
            
            // Si llegas arriba de todo, lo ocultamos para ver el título principal
            if (scrollTop <= 20) {
                header.classList.remove('header-visible');
            }
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        }
    }, { passive: true });
});
</script>
</body>
</html>
